<script>
// ── STATE ─────────────────────────────────────────────────────────────
let S = {
  projects: [],
  fund: { kurAmount:500, angsuran:9.6665, bufferMonths:6, living:25,
          startDate: new Date().toISOString().split('T')[0] },
  external: []
};
let CP='b', MT='aktif', eP=null, eE=null, extTab='pinjaman';
let charts={}, profPeriod='6m', profCFrom='', profCTo='';

let _pin='', _saving=false, _saveTimer=null;
const DOC_ID='main_data';

function load(){
  try{const s=localStorage.getItem('dt_v3');if(s)S={...S,...JSON.parse(s)};}catch(e){}
}
async function loadFromFirestore(){
  try{
    const snap=await db.collection('danatrack').doc(DOC_ID).get();
    if(snap.exists){const d=snap.data();S={...S,...d.state};localStorage.setItem('dt_v3',JSON.stringify(S));}
  }catch(e){console.warn('Firestore load:',e);}
}
function save(){
  try{localStorage.setItem('dt_v3',JSON.stringify(S));}catch(e){}
  if(!_adminUnlocked)return; // only admin can write to cloud
  if(_saveTimer)clearTimeout(_saveTimer);
  _saveTimer=setTimeout(saveToFirestore,800);
}
async function saveToFirestore(){
  if(!_adminUnlocked||_saving)return;_saving=true;
  try{await db.collection('danatrack').doc(DOC_ID).set({state:JSON.parse(JSON.stringify(S)),updatedAt:new Date().toISOString()},{merge:true});}catch(e){console.warn('Firestore save:',e);}
  _saving=false;
}
function exportJ(){const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='danatrack-'+new Date().toISOString().split('T')[0]+'.json';a.click();URL.revokeObjectURL(u);toast('✅ Data diekspor!')}
function importJ(){const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{S={...S,...JSON.parse(ev.target.result)};save();rAll();toast('✅ Data diimpor!')}catch{toast('❌ File tidak valid!')}};r.readAsText(f)};i.click()}

// ── UTILS ─────────────────────────────────────────────────────────────
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
function fj(v){ if(v==null) return '—'; const n=parseFloat(v); if(isNaN(n)) return '—'; if(Math.abs(n)>=1000) return `Rp ${(n/1000).toFixed(3).replace(/0+$/,'').replace(/\.$/,'')} M`; const s=n.toFixed(3).replace(/0+$/,'').replace(/\.$/,''); return `Rp ${s} jt`; }
function fd(s){ if(!s) return '—'; return new Date(s+'T00:00:00').toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}); }
function du(s){ if(!s) return null; const n=new Date(); n.setHours(0,0,0,0); return Math.round((new Date(s+'T00:00:00')-n)/86400000); }
function gl(d){ if(d===null) return ''; if(d<0) return `${Math.abs(d)}h terlambat`; if(d===0) return 'Jatuh tempo hari ini!'; return `${d} hari lagi`; }
function gc(d){ if(d===null) return 'var(--sub)'; if(d<0) return 'var(--r)'; if(d<=7) return 'var(--o)'; return 'var(--sub)'; }
function am(s,m){ const d=new Date(s+'T00:00:00'); d.setMonth(d.getMonth()+m); return d.toISOString().split('T')[0]; }
function ret(j){ return parseFloat((parseFloat(j)*100/85).toFixed(2)); }
function prof(j){ return parseFloat((parseFloat(j)*15/85).toFixed(2)); }
// Project-aware: kontrak = nilai kontrak, jumlah = deploy
// Profit = kontrak - deploy (or for bulanan: returnBulanan × durasi)
function kontrakP(p){ return parseFloat(p.kontrak||0) || parseFloat(p.jumlah||0); }
function profP(p){
  // tersedia → selesai without being taken = no profit
  if(p.status === 'selesai' && !wasTaken(p)) return 0;
  const rt=p.returnType||'sekali';
  if(rt==='bulanan'){
    // returnBulanan bisa dalam Rp atau % dari kontrak
    const dur=parseInt(p.durasiReturn||0);
    let rb;
    if(p.returnMode==='persen'){
      rb=kontrakP(p)*parseFloat(p.returnPersen||0)/100;
    } else {
      rb=parseFloat(p.returnBulanan||0);
    }
    return parseFloat((rb*dur).toFixed(2));
  }
  // sekali: profit = kontrak - deploy
  return parseFloat((kontrakP(p)-parseFloat(p.jumlah)).toFixed(2));
}
function retBulananRp(p){
  if(p.returnMode==='persen') return parseFloat((kontrakP(p)*parseFloat(p.returnPersen||0)/100).toFixed(2));
  return parseFloat(p.returnBulanan||0);
}
function retLabel(p){
  const rt=p.returnType||'sekali';
  if(rt==='bulanan'){
    const rb=retBulananRp(p);
    const dur=parseInt(p.durasiReturn||1);
    const pct=p.returnMode==='persen'?` (${p.returnPersen}%)`:'';
    return `${fj(rb)}/bln${pct} × ${dur} bln`;
  }
  return `${fj(kontrakP(p))} (1×)`;
}
function profUmum(p){
  // tersedia → selesai without being taken = no profit
  if(p.status === 'selesai' && !wasTaken(p)) return 0;
  const rt=p.returnType||'sekali';
  if(rt==='bulanan'){
    const dur=parseInt(p.durasiReturn||0);
    let rb;
    if(p.returnModeUmum==='persen'){
      rb=kontrakP(p)*parseFloat(p.returnPersenUmum||0)/100;
    } else {
      rb=parseFloat(p.returnBulananUmum||0);
    }
    return parseFloat((rb*dur).toFixed(2));
  }
  // sekali: umum profit from sekaliUmum fields
  if(p.sekaliModeUmum==='rupiah') return parseFloat(p.sekaliUmumRp||0);
  if(p.sekaliUmumPersen) return parseFloat((kontrakP(p)*parseFloat(p.sekaliUmumPersen||0)/100).toFixed(2));
  return 0;
}
function retLabelUmum(p){
  const rt=p.returnType||'sekali';
  if(rt==='bulanan'){
    let rb;
    if(p.returnModeUmum==='persen'){
      rb=parseFloat((kontrakP(p)*parseFloat(p.returnPersenUmum||0)/100).toFixed(2));
    } else {
      rb=parseFloat(p.returnBulananUmum||0);
    }
    const dur=parseInt(p.durasiReturn||1);
    const pct=p.returnModeUmum==='persen'?` (${p.returnPersenUmum}%)`:'';
    return `${fj(rb)}/bln${pct} × ${dur} bln`;
  }
  // sekali umum
  const pu=profUmum(p);
  const pctLbl=p.sekaliUmumPersen?` (${p.sekaliUmumPersen}%)`:'';
  return `${fj(kontrakP(p)+pu)}${pctLbl} (1×)`;
}
// ── INVESTOR & SCHEDULE HELPERS ──────────────────────────────────────
// Calculate investor's total return based on UMUM rate for their allocated amount
function calcInvestorReturn(project, allocAmount){
  const rt=project.returnType||'sekali';
  const amt=parseFloat(allocAmount||0);
  const k=kontrakP(project);
  if(rt==='bulanan'){
    const dur=parseInt(project.durasiReturn||0);
    let umumPerMonth;
    if(project.returnModeUmum==='persen'){
      umumPerMonth=k*parseFloat(project.returnPersenUmum||0)/100;
    } else {
      umumPerMonth=parseFloat(project.returnBulananUmum||0);
    }
    // investor gets umum rate proportional to their amount
    return parseFloat((umumPerMonth * (amt/k) * dur).toFixed(2));
  }
  // sekali: investor gets umum profit proportional to their amount
  const totalUmumProfit=profUmum(project);
  return parseFloat((totalUmumProfit * (amt/k)).toFixed(2));
}

// Calculate admin's net profit after paying all investors
function calcAdminNetProfit(project){
  const totalAdminProfit=profP(project);
  const invs=S.external.filter(e=>e.tipe==='investor'&&(e.alokasi||[]).some(a=>a.pid===project.id));
  let totalInvShare=0;
  invs.forEach(e=>{
    const a=e.alokasi.find(x=>x.pid===project.id)||{};
    totalInvShare+=calcInvestorReturn(project, a.jumlah||0);
  });
  return parseFloat((totalAdminProfit - totalInvShare).toFixed(2));
}

// Generate monthly payment schedule for a project
function generateSchedule(project){
  if(!project.tanggalMulai || !project.durasiReturn) return;
  const dur=parseInt(project.durasiReturn||0);
  if(dur<=0) return;
  const rt=project.returnType||'sekali';
  if(rt!=='bulanan') return;
  // Check if schedule exists and matches duration + amount
  const existing=project.schedule||[];
  const monthlyAmt0=retBulananRp(project);
  const amtMatch=existing.length>0&&Math.abs(parseFloat(existing[0].amount||0)-monthlyAmt0)<0.001;
  if(existing.length===dur&&amtMatch) return; // already correct
  // Build new schedule, preserving paid statuses from existing
  const monthlyAmt=monthlyAmt0;
  const newSched=[];
  for(let i=0;i<dur;i++){
    const dueDate=am(project.tanggalMulai, i+1);
    const old=existing[i]||null;
    newSched.push({
      month: i+1,
      dueDate: dueDate,
      status: old&&old.status==='paid'?'paid':'pending',
      paidDate: old&&old.status==='paid'?(old.paidDate||null):null,
      amount: monthlyAmt,
      isFinal: i===dur-1
    });
  }
  project.schedule=newSched;
}

// Get the next unpaid schedule item (or null if all paid)
function getNextDue(project){
  const rt=project.returnType||'sekali';
  if(rt==='bulanan'){
    generateSchedule(project);
    const sched=project.schedule||[];
    return sched.find(s=>s.status!=='paid')||null;
  }
  // sekali: single payment at tanggalJT
  const paid=(project.payments||[]).length>0;
  if(paid) return null;
  return {month:1, dueDate:project.tanggalJT, status:'pending', paidDate:null, amount:kontrakP(project), isFinal:true};
}

function hsc(p){ if(p.status==='terlambat') return 'r'; if(p.status==='tersedia') return 'o'; if(p.status==='selesai') return isTidakTerambil(p)?'vi':'v'; return 'g'; }
function wasTaken(p){ return !!(p.tanggalAktif || (p.schedule && p.schedule.some(s=>s.status==='paid'))); }
function isTidakTerambil(p){ return p.status==='selesai'&&!wasTaken(p); }
function statusLabel(s,p,adminView){ if(s==='selesai'&&p&&isTidakTerambil(p)&&adminView) return '⏭️ Tidak Terambil'; return s==='aktif'?'🟢 Aktif':s==='terlambat'?'🔴 Terlambat':s==='tersedia'?'🟡 Tersedia':'✅ Selesai'; }
function statusCls(p,adminView){ if(isTidakTerambil(p)&&adminView) return 'tidak-terambil'; return p.status; }
function stats(){
  const f=S.fund, kurOn=f.kurEnabled!==false&&f.kurAmount>0;
  const buf=kurOn?f.angsuran*f.bufferMonths:0;
  const avail=kurOn?f.kurAmount-buf-f.living:0;
  const dep=S.projects.filter(p=>p.status==='aktif'||p.status==='terlambat').reduce((s,p)=>s+parseFloat(p.jumlah||0),0);
  const idle=kurOn?Math.max(0,avail-dep):0;
  const tp=S.projects.reduce((s,p)=>{
    if((p.returnType||'sekali')==='bulanan'&&p.schedule){
      // Use schedule as source of truth for bulanan
      return s+p.schedule.filter(si=>si.status==='paid').reduce((ps,si)=>ps+parseFloat(si.paidAmount||si.amount||0),0);
    }
    // Sekali: use payments array
    return s+(p.payments||[]).reduce((ps,py)=>ps+parseFloat(py.jumlah||0),0);
  },0);
  const ms=f.startDate?Math.max(1,Math.round((new Date()-new Date(f.startDate+'T00:00:00'))/2629800000)):1;
  const bufRem=buf/f.angsuran;
  const pinjCic=S.external.filter(e=>e.tipe==='pinjaman'&&e.status!=='selesai').reduce((s,e)=>s+parseFloat(e.cicilanBulan||0),0);
  const pinjP=S.external.filter(e=>e.tipe==='pinjaman'&&e.status!=='selesai').reduce((s,e)=>s+parseFloat(e.jumlah||0),0);
  const invP=S.external.filter(e=>e.tipe==='investor'&&e.status!=='selesai').reduce((s,e)=>s+parseFloat(e.jumlah||0),0);
  // investor idle = total investor funds - allocated to projects
  const invAlloc=S.external.filter(e=>e.tipe==='investor'&&e.status!=='selesai').reduce((s,e)=>s+(e.alokasi||[]).reduce((as,a)=>as+parseFloat(a.jumlah||0),0),0);
  const invIdle=Math.max(0,invP-invAlloc);
  return{buf,avail,dep,idle,tp,ms,bufRem,pinjCic,pinjP,invP,invIdle};
}

function docCalcSiklus(){
  const dur=parseInt(document.getElementById('doc-durasi')?.value||0);
  const sik=parseInt(document.getElementById('doc-siklus')?.value||1)||1;
  const bh=parseFloat(document.getElementById('doc-bh')?.value||0);
  const jml=document.getElementById('doc-jmlbayar');
  const info=document.getElementById('doc-siklus-info');
  if(jml&&dur>0) jml.value=Math.ceil(dur/sik);
  if(info&&dur>0&&bh>0){
    const nPay=Math.ceil(dur/sik);
    const totalPct=bh*nPay;
    info.style.display='block';
    info.innerHTML=`💡 ${bh}% per ${sik} bulan × ${nPay} pembayaran = <b>${totalPct}% total bagi hasil</b>`;
  } else if(info) info.style.display='none';
}

    document.getElementById('doc-p1-nama').value=inv.nama||'';

function saveDocHistory(d){
  if(!S.generatedDocs) S.generatedDocs=[];
  const projName=d.tipe==='kelola'?'Dana Kelola Penuh':S.projects.find(p=>p.id===d.proyek)?.peminjam||'—';
  // Check if this nomor already exists (re-download case)
  const existing=S.generatedDocs.find(x=>x.nomor===d.nomor);
  if(existing) return;
  // Store full form data for re-download (exclude signature base64 to save space)
  const saved={...d, prefix:'INV', proyekNama:projName, savedAt:new Date().toISOString()};
  delete saved.sigInvestor; delete saved.sigPengelola;
  S.generatedDocs.push(saved);
  save();
}

function saveDoc(){
  const d=getDocFormData();const err=validateDocForm(d);if(err){toast('❌ '+err);return;}
  saveDocHistory(d);
  toast('💾 Dokumen tersimpan!');
  _docView='list';rDoc();
}

function buildDocParagraphs(d){
  const fdd=s=>{if(!s)return '—';const dt=new Date(s+'T00:00:00');const dd=String(dt.getDate()).padStart(2,'0');const mm=String(dt.getMonth()+1).padStart(2,'0');return `${dd}/${mm}/${dt.getFullYear()}`;};
  const tgl=fdd(d.tanggal),tglM=fdd(d.mulai),tglA=fdd(d.akhir);
  const nominal=d.jumlah*1000000;
  const jmlRp='Rp '+(nominal).toLocaleString('id-ID');
  const isKP=d.tipe==='kelola';
  const dendaLbl=d.wpDenda>0?` Denda keterlambatan sebesar ${d.wpDenda}% per bulan dari jumlah yang tertunggak.`:'';
  // terbilang helper
  const terbilang=(n)=>{
    const satuan=['','satu','dua','tiga','empat','lima','enam','tujuh','delapan','sembilan','sepuluh','sebelas'];
    if(n<0) return 'minus '+terbilang(-n);
    if(n<12) return satuan[n];
    if(n<20) return satuan[n-10]+' belas';
    if(n<100) return satuan[Math.floor(n/10)]+' puluh'+(n%10?' '+satuan[n%10]:'');
    if(n<200) return 'seratus'+(n%100?' '+terbilang(n%100):'');
    if(n<1000) return satuan[Math.floor(n/100)]+' ratus'+(n%100?' '+terbilang(n%100):'');
    if(n<2000) return 'seribu'+(n%1000?' '+terbilang(n%1000):'');
    if(n<1000000) return terbilang(Math.floor(n/1000))+' ribu'+(n%1000?' '+terbilang(n%1000):'');
    if(n<1000000000) return terbilang(Math.floor(n/1000000))+' juta'+(n%1000000?' '+terbilang(n%1000000):'');
    if(n<1000000000000) return terbilang(Math.floor(n/1000000000))+' miliar'+(n%1000000000?' '+terbilang(n%1000000000):'');
    return terbilang(Math.floor(n/1000000000000))+' triliun'+(n%1000000000000?' '+terbilang(n%1000000000000):'');
  };
  const nominalHuruf=terbilang(nominal)+' rupiah';
  // project info
  const proj=!isKP&&d.proyek?S.projects.find(p=>p.id===d.proyek):null;
  const projNama=proj?proj.peminjam:(d.proyekNama||'—');
  const projJumlah=proj?'Rp '+(parseFloat(proj.jumlah||0)*1000000).toLocaleString('id-ID'):jmlRp;
  const projPeriode=proj?`bulan ke-1 s.d. ${d.durasi}`:`bulan ke-1 s.d. ${d.durasi}`;
  // bagi hasil illustration
  const danaNum=nominal;
  const estReturn=danaNum*d.bh/100;
  const estReturnRp='Rp '+estReturn.toLocaleString('id-ID');
  const danaRpFmt='Rp '+danaNum.toLocaleString('id-ID');
  return {tgl,tglM,tglA,jmlRp,isKP,dendaLbl,nominal,nominalHuruf,proj,projNama,projJumlah,projPeriode,danaRpFmt,estReturn,estReturnRp,fdd};
}

async function downloadDocx(savedData){

  const v=buildDocParagraphs(d);
  try{
    const {Document,Paragraph,TextRun,Table,TableRow,TableCell,WidthType,AlignmentType,BorderStyle,Packer,ImageRun,LevelFormat}=docx;
    const FONT='Arial';
    const bNone={top:{style:BorderStyle.NONE,size:0},bottom:{style:BorderStyle.NONE,size:0},left:{style:BorderStyle.NONE,size:0},right:{style:BorderStyle.NONE,size:0}};

    // Helper: multi-run paragraph
    function mp(runs,opts={}){
      return new Paragraph({
        alignment:opts.center?AlignmentType.CENTER:AlignmentType.BOTH,
        spacing:{after:opts.after!==undefined?opts.after:120,before:opts.before||0},
        numbering:opts.numbering||undefined,
        children:runs
      });
    }
    function tr(text,opts={}){
      return new TextRun({text,font:FONT,size:opts.size||22,bold:opts.bold||false,italics:opts.italic||false,color:opts.color||undefined});
    }
    function pr(text,opts={}){
      return mp([tr(text,opts)],opts);
    }
    function emptyP(){return new Paragraph({spacing:{after:0},children:[]});}

    // Info row for party details
    function infoRow(label,value,valueBold){
      return new TableRow({children:[
        new TableCell({width:{size:2500,type:WidthType.DXA},borders:bNone,children:[mp([tr(label,{size:22})])]}),
        new TableCell({width:{size:300,type:WidthType.DXA},borders:bNone,children:[mp([tr(':',{size:22})])]}),
        new TableCell({width:{size:6200,type:WidthType.DXA},borders:bNone,children:[mp([tr(value,{size:22,bold:!!valueBold})])]})

function buildRealisasi(){
  const invId=document.getElementById('real-inv')?.value;
  const el=document.getElementById('real-content');if(!el)return;
  if(!invId){el.innerHTML='';return;}
  const inv=S.external.find(e=>e.id===invId);if(!inv){el.innerHTML='';return;}
  const allocs=(inv.alokasi||[]).map(a=>{const p=S.projects.find(x=>x.id===a.pid);return p?{...a,project:p}:null;}).filter(Boolean);
  let totalInvested=0,totalPaid=0,totalPending=0;
  let rows='';
  allocs.forEach(a=>{
    const p=a.project;const k=kontrakP(p);const pctOwn=k>0?((a.jumlah||0)/k*100).toFixed(1):0;
    totalInvested+=parseFloat(a.jumlah||0);
    const invReturn=calcInvestorReturn(p,a.jumlah||0);
    // paid from schedule
    let paid=0;
    if((p.returnType||'sekali')==='bulanan'&&p.schedule){
      const umumPerMonth=p.returnModeUmum==='persen'?k*parseFloat(p.returnPersenUmum||0)/100:parseFloat(p.returnBulananUmum||0);

function getProfitEntries(){
  const entries=[];
  S.projects.forEach(p=>{
    if((p.returnType||'sekali')==='bulanan'&&p.schedule){
      p.schedule.filter(si=>si.status==='paid').forEach(si=>{
        const d=si.paidDate||'';
        const amt=parseFloat(si.paidAmount||si.amount||0);
        if(amt>0&&d) entries.push({tanggal:d,jumlah:amt,label:p.peminjam});
      });
    } else {
      (p.payments||[]).forEach(py=>{
        const amt=parseFloat(py.jumlah||0);
        if(amt>0&&py.tanggal) entries.push({tanggal:py.tanggal,jumlah:amt,label:p.peminjam});
      });
    }
  });
  return entries;
}

function buildPChartPeriod(){
  const entries=getProfitEntries();
  const now=new Date();
  let fromD=null, toD=new Date(now.getFullYear(),now.getMonth()+1,0);
  if(profPeriod==='3m') fromD=new Date(now.getFullYear(),now.getMonth()-2,1);
  else if(profPeriod==='6m') fromD=new Date(now.getFullYear(),now.getMonth()-5,1);
  else if(profPeriod==='1y') fromD=new Date(now.getFullYear()-1,now.getMonth()+1,1);
  else if(profPeriod==='ytd') fromD=new Date(now.getFullYear(),0,1);
  else if(profPeriod==='custom'){
    fromD=profCFrom?new Date(profCFrom+'T00:00:00'):null;
    toD=profCTo?new Date(profCTo+'T23:59:59'):new Date();
  }
  const filtered=entries.filter(e=>{const d=new Date(e.tanggal+'T00:00:00');return(!fromD||d>=fromD)&&d<=toD;});
  const monthSet=new Set();
  filtered.forEach(e=>{const d=new Date(e.tanggal+'T00:00:00');monthSet.add(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));});
  if(monthSet.size===0){for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);monthSet.add(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));}}
  const months=[...monthSet].sort();
  const labels=months.map(m=>{const[y,mo]=m.split('-');return new Date(parseInt(y),parseInt(mo)-1,1).toLocaleDateString('id-ID',{month:'short',year:'2-digit'});});
  const data=months.map(m=>filtered.filter(e=>{const d=new Date(e.tanggal+'T00:00:00');return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')===m;}).reduce((s,e)=>s+e.jumlah,0));
  buildPChart(labels,data);
}

  const k=parseFloat(document.getElementById('fp-k')?.value||0);
  const j=getFormDeploy();
  const c=document.getElementById('fp-c');
  const hint=document.getElementById('fp-deploy-hint');
  if(!c) return;
  // show deploy hint in % mode
  const dm=window._getDeployMode?window._getDeployMode():'rupiah';
  if(hint){
    if(dm==='persen'&&k>0){const pct=parseFloat(document.getElementById('fp-jpct')?.value||0);hint.textContent=`${pct}% × ${fj(k)} = ${fj(k*pct/100)} keluar`;}
    else hint.textContent='Uang yang benar-benar keluar';
  }
  if(k<=0&&j<=0){c.style.display='none';return;}
  const rt=document.getElementById('fp-rt')?.value||'sekali';
  const kontrak=k||j;
  const deploy=j||k;
  if(rt==='bulanan'){
    const dur=parseInt(document.getElementById('fp-dur')?.value||0);
    const mode=window._getRetMode?window._getRetMode():'rupiah';
    let rb;
    if(mode==='persen'){
      const pct=parseFloat(document.getElementById('fp-pct')?.value||0);
      rb=kontrak*pct/100;
    } else {
      rb=parseFloat(document.getElementById('fp-rb')?.value||0);
    }
    if(rb>0&&dur>0){
      const totalProf=rb*dur;
      c.style.display='block';
      c.innerHTML=`💡 Kontrak <b>${fj(kontrak)}</b> · Deploy <b>${fj(deploy)}</b><br>
        Return: ${fj(rb)}/bln × ${dur} bln = <b style="color:#0B8F46">+${fj(totalProf)} profit</b><br>
        <span style="font-size:10px;color:var(--sub)">Pokok ${fj(deploy)} kembali di akhir · Total: ${fj(deploy+totalProf)}</span>`;
    } else {c.style.display='none';}
  } else {
    const totalProf=kontrak-deploy;
    c.style.display='block';
    c.innerHTML=`💡 Kontrak <b>${fj(kontrak)}</b> · Deploy <b>${fj(deploy)}</b><br>

// ── SCHEDULE PAYMENT ──────────────────────────────────────────────────
function confirmSchedulePay(pid, month){
  const p=S.projects.find(x=>x.id===pid); if(!p) return;
  const rt=p.returnType||'sekali';
  const today=new Date().toISOString().split('T')[0];
  let defAmt, defNote;
  if(rt==='bulanan'){
    generateSchedule(p);
    const item=p.schedule.find(s=>s.month===month);
    if(!item||item.status==='paid') return;
    defAmt=item.amount+(item.isFinal?parseFloat(p.jumlah):0);
    defNote=`Bulan ${month}${item.isFinal?' + Pokok':''}`;
  } else {
    defAmt=kontrakP(p);
    defNote='Pengembalian sekali';
  }
  // Show inline edit form
  const formId='spay-form-'+month;
  const existing=document.getElementById(formId);
  if(existing){existing.remove();return;}
  // Remove any other open forms
  document.querySelectorAll('[id^="spay-form-"]').forEach(el=>el.remove());
  const row=document.getElementById('srow-'+pid+'-'+month);
  if(!row) return;
  const form=document.createElement('div');
  form.id=formId;
  form.style.cssText='background:var(--p-l);border-radius:14px;padding:14px;margin-top:8px';
  form.innerHTML=`
    <div class="fr" style="margin-bottom:8px">
      <div class="fg" style="margin:0"><label class="fl">Jumlah (jt)</label><input class="fi" id="sp-amt-${month}" type="number" step="0.01" value="${defAmt}"></div>
      <div class="fg" style="margin:0"><label class="fl">Tanggal</label><input class="fi" id="sp-date-${month}" type="date" value="${today}"></div>
    </div>
    <div class="fg" style="margin-bottom:10px"><label class="fl">Catatan</label><input class="fi" id="sp-note-${month}" value="${defNote}" placeholder="Opsional"></div>`;
  const btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:8px';
  const saveBtn=document.createElement('button');
  saveBtn.className='btn gr fw';saveBtn.textContent='✅ Simpan';
  saveBtn.onclick=function(){
    const amt=parseFloat(document.getElementById('sp-amt-'+month)?.value||0);
    const date=document.getElementById('sp-date-'+month)?.value||today;
    const note=document.getElementById('sp-note-'+month)?.value||'';
    if(!amt||amt<=0){toast('❌ Jumlah wajib');return;}
    if(rt==='bulanan'){
      const item2=p.schedule.find(s2=>s2.month===month);
      if(item2){item2.status='paid';item2.paidDate=date;item2.paidAmount=amt;item2.catatan=note;}
      if(!p.payments) p.payments=[];
      p.payments.push({id:uid(),tanggal:date,jumlah:amt,catatan:note});
      if(p.schedule.every(s2=>s2.status==='paid')) p.status='selesai';
    } else {
      if(!p.payments) p.payments=[];
      p.payments.push({id:uid(),tanggal:date,jumlah:amt,catatan:note});
      p.status='selesai';
    }
    save();cm('mo-det');oDet(pid);rAll();
    toast('✅ Pembayaran dicatat!');
  };
  const cancelBtn=document.createElement('button');
  cancelBtn.className='btn ou fw';cancelBtn.textContent='Batal';
  cancelBtn.onclick=function(){form.remove();};
  btnRow.appendChild(saveBtn);btnRow.appendChild(cancelBtn);
  form.appendChild(btnRow);
  row.after(form);
}
function editSchedulePay(pid, month){
  const p=S.projects.find(x=>x.id===pid); if(!p) return;
  generateSchedule(p);
  const item=p.schedule.find(s=>s.month===month);
  if(!item||item.status!=='paid') return;
  // Find matching payment in payments array
  const payIdx=(p.payments||[]).findIndex(py=>py.catatan&&py.catatan.includes('Bulan '+month));
  const pay=payIdx>=0?p.payments[payIdx]:null;
  const curAmt=pay?pay.jumlah:(item.paidAmount||item.amount);
  const curDate=pay?pay.tanggal:(item.paidDate||'');
  const curNote=pay?pay.catatan:'';
  // Toggle form
  const formId='spay-form-'+month;
  const existing=document.getElementById(formId);
  if(existing){existing.remove();return;}
  document.querySelectorAll('[id^="spay-form-"]').forEach(el=>el.remove());
  const row=document.getElementById('srow-'+pid+'-'+month);
  if(!row) return;
  const form=document.createElement('div');
  form.id=formId;
  form.style.cssText='background:var(--p-l);border-radius:14px;padding:14px;margin-top:8px';
  form.innerHTML=`
    <div class="fr" style="margin-bottom:8px">
      <div class="fg" style="margin:0"><label class="fl">Jumlah (jt)</label><input class="fi" id="sp-amt-${month}" type="number" step="0.01" value="${curAmt}"></div>
      <div class="fg" style="margin:0"><label class="fl">Tanggal</label><input class="fi" id="sp-date-${month}" type="date" value="${curDate}"></div>
    </div>
    <div class="fg" style="margin-bottom:10px"><label class="fl">Catatan</label><input class="fi" id="sp-note-${month}" value="${curNote}" placeholder="Opsional"></div>`;
  const btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:8px';
  const saveBtn=document.createElement('button');
  saveBtn.className='btn gr fw';saveBtn.textContent='💾 Simpan';
  saveBtn.onclick=function(){
    const amt=parseFloat(document.getElementById('sp-amt-'+month)?.value||0);
    const date=document.getElementById('sp-date-'+month)?.value||'';
    const note=document.getElementById('sp-note-'+month)?.value||'';
    if(!amt||amt<=0){toast('❌ Jumlah wajib');return;}
    item.paidAmount=amt;
    item.paidDate=date;
    item.catatan=note;
    // Update payments array
    if(payIdx>=0){
      p.payments[payIdx].jumlah=amt;
      p.payments[payIdx].tanggal=date;
      p.payments[payIdx].catatan=note;
    }
    save();cm('mo-det');oDet(pid);rAll();
    toast('✅ Pembayaran diupdate!');
  };
  const cancelBtn=document.createElement('button');
  cancelBtn.className='btn ou fw';cancelBtn.textContent='Batal';
  cancelBtn.onclick=function(){form.remove();};
  btnRow.appendChild(saveBtn);btnRow.appendChild(cancelBtn);
  form.appendChild(btnRow);
  row.after(form);
}

function addInvRowData(pid,jumlah,pct){
  const rowsEl=document.getElementById('inv-alloc-rows'); if(!rowsEl) return;
  const row=document.createElement('div');
  row.style.cssText='display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:6px;margin-bottom:8px;align-items:center';
  const projSel=document.createElement('select');projSel.className='fi fs inv-pid';projSel.style.fontSize='11px';
  projSel.innerHTML=`<option value="">-- Proyek --</option>${S.projects.map(p=>`<option value="${p.id}"${p.id===pid?' selected':''}>${p.peminjam} (${fj(kontrakP(p))})</option>`).join('')}`;
  const jmlIn=document.createElement('input');jmlIn.className='fi inv-jml';jmlIn.type='number';jmlIn.step='0.01';jmlIn.placeholder='jt';jmlIn.value=jumlah||'';jmlIn.style.fontSize='11px';
  const pctIn=document.createElement('input');pctIn.className='fi inv-pct';pctIn.type='number';pctIn.step='0.1';pctIn.placeholder='%';pctIn.value=pct||'';pctIn.style.fontSize='11px';
  // Auto-calc: nominal ↔ % kepemilikan
  function getKontrak(){ const sel=projSel.value; const pp=S.projects.find(x=>x.id===sel); return pp?kontrakP(pp):0; }
  jmlIn.addEventListener('input',()=>{ const k=getKontrak(); if(k>0){pctIn.value=((parseFloat(jmlIn.value||0)/k)*100).toFixed(1);} updInvIdle(); });
  pctIn.addEventListener('input',()=>{ const k=getKontrak(); if(k>0){jmlIn.value=((parseFloat(pctIn.value||0)/100)*k).toFixed(2);} updInvIdle(); });
  projSel.addEventListener('change',()=>{ const k=getKontrak(); if(k>0&&jmlIn.value){pctIn.value=((parseFloat(jmlIn.value||0)/k)*100).toFixed(1);} updInvIdle(); });
  const rmBtn=document.createElement('button');rmBtn.type='button';rmBtn.style.cssText='background:var(--r-l);color:var(--r);border:none;border-radius:8px;width:30px;height:36px;font-size:14px;cursor:pointer';rmBtn.textContent='×';
  rmBtn.onclick=()=>{row.remove();updInvIdle();};
  row.appendChild(projSel);row.appendChild(jmlIn);row.appendChild(pctIn);row.appendChild(rmBtn);
  rowsEl.appendChild(row);
}
function updInvIdle(){
  const j=parseFloat(document.getElementById('fe-j')?.value||0);
  const total=Array.from(document.querySelectorAll('.inv-jml')).reduce((s,r)=>s+parseFloat(r.value||0),0);
  const idle=j-total;
  const tEl=document.getElementById('inv-alloc-total');
  const iEl=document.getElementById('inv-idle');
  if(tEl) tEl.textContent=fj(total);
  if(iEl){iEl.textContent=fj(idle);iEl.style.color=idle<0?'var(--r)':idle>0?'#B56B00':'#0B8F46';}
}
function calcC(){
  const j=parseFloat(document.getElementById('fe-j')?.value||0);
  const dur=parseFloat(document.getElementById('fe-dur')?.value||0);
  const b=parseFloat(document.getElementById('fe-b')?.value||0);
  const cb=document.getElementById('fe-cb');
  if(cb&&j>0&&b>0) cb.value=dur>0?(j/dur+j*b/100).toFixed(2):(j*b/100).toFixed(2);
  updPinjInfo();
}
function calcBunga(){
  const j=parseFloat(document.getElementById('fe-j')?.value||0);
  const dur=parseFloat(document.getElementById('fe-dur')?.value||0);
  const cb=parseFloat(document.getElementById('fe-cb')?.value||0);
  const bEl=document.getElementById('fe-b');
  if(bEl&&j>0&&dur>0&&cb>0) bEl.value=((cb-j/dur)/j*100).toFixed(2);
  else if(bEl&&j>0&&cb>0) bEl.value=(cb/j*100).toFixed(2);
  updPinjInfo();
}
function updPinjInfo(){
  const j=parseFloat(document.getElementById('fe-j')?.value||0);
  const dur=parseFloat(document.getElementById('fe-dur')?.value||0);
  const cb=parseFloat(document.getElementById('fe-cb')?.value||0);
  const el=document.getElementById('pinj-info'); if(!el) return;
  if(j>0&&dur>0&&cb>0){const total=cb*dur;el.innerHTML=`Total bayar: <b>${fj(total)}</b><br>Total bunga: <b style="color:var(--r)">${fj(total-j)}</b>`;}
  else el.textContent='Isi jumlah, durasi & cicilan';
}
function saveExt(tipe){
  const n=document.getElementById('fe-n')?.value?.trim();
  const j=parseFloat(document.getElementById('fe-j')?.value);
  const st2=document.getElementById('fe-st')?.value;
  const ct=document.getElementById('fe-ct')?.value?.trim();
  const t=document.getElementById('fe-t')?.value;
  if(!n){toast('❌ Nama wajib');return;}
  if(!j||j<=0){toast('❌ Jumlah wajib');return;}
  let obj={tipe,nama:n,jumlah:j,status:st2,catatan:ct,tanggal:t};
  if(tipe==='pinjaman'){
    obj={...obj,durasi:parseInt(document.getElementById('fe-dur')?.value||0),bungaPct:parseFloat(document.getElementById('fe-b')?.value||0),cicilanBulan:parseFloat(document.getElementById('fe-cb')?.value||0),jadwalBayar:document.getElementById('fe-jb')?.value};
  } else {
    const bh=parseFloat(document.getElementById('fe-bh')?.value||0);
    const alok=Array.from(document.getElementById('inv-alloc-rows')?.children||[]).map(row=>{
      const pid=row.querySelector('.inv-pid')?.value;
      const jmlVal=parseFloat(row.querySelector('.inv-jml')?.value||0);
      const pctVal=parseFloat(row.querySelector('.inv-pct')?.value||0);
      return pid?{pid,jumlah:jmlVal,pctProyek:pctVal}:null;
    }).filter(Boolean);
    obj={...obj,bagiHasilPct:bh,alokasi:alok};
  }
  if(eE){const i=S.external.findIndex(e=>e.id===eE);if(i>=0) S.external[i]={...S.external[i],...obj};toast('✅ Diupdate!');}
  else{S.external.push({id:uid(),...obj});toast('🎉 Ditambahkan!');}
  save();cm('mo-ext');rE();
}
function delExt(id){if(!confirm('Hapus?'))return;S.external=S.external.filter(e=>e.id!==id);save();cm('mo-ext');rE();toast('🗑️ Dihapus');}

  for(let i=0;i<6;i++){const d=document.createElement('div');d.style.cssText='width:14px;height:14px;border-radius:50%;border:2.5px solid rgba(255,255,255,.5);transition:all .15s';d.id='dot-'+i;dots.appendChild(d);}
  let pin=[];
  const bs='width:64px;height:64px;border-radius:50%;border:2px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;font-size:22px;font-weight:900;cursor:pointer;font-family:Nunito,sans-serif;transition:all .1s;-webkit-tap-highlight-color:transparent';
  for(let n=1;n<=9;n++){const b=document.createElement('button');b.style.cssText=bs;b.textContent=n;b.onclick=()=>addDigit(n);pad.appendChild(b);}
  pad.appendChild(document.createElement('div'));
  const b0=document.createElement('button');b0.style.cssText=bs;b0.textContent='0';b0.onclick=()=>addDigit(0);pad.appendChild(b0);
  const bd=document.createElement('button');bd.style.cssText=bs+';font-size:16px';bd.textContent='\u232B';bd.onclick=()=>{if(pin.length>0){pin.pop();upd();}};pad.appendChild(bd);
  function upd(){for(let i=0;i<6;i++){document.getElementById('dot-'+i).style.background=i<pin.length?'#fff':'transparent';}}
  function addDigit(n){
    if(pin.length>=6)return;pin.push(n);upd();
    if(pin.length===6){
      const code=pin.join('');
      if(code==='110869'){_pin=code;unlockAdmin();}
      else{document.getElementById('pin-error').textContent='\u274C PIN salah!';pin=[];setTimeout(()=>{upd();document.getElementById('pin-error').textContent='';},1200);}
    }
  }
}

function showPin(){
  if(_adminUnlocked){go('m');return;}
  buildPinPad();
  om('mo-pin');
}

async function unlockAdmin(){
  _adminUnlocked=true;
  cm('mo-pin');
  // Show admin tabs, hide admin button
  document.getElementById('n-m').style.display='';
  document.getElementById('n-d').style.display='';
  document.getElementById('n-e').style.display='';
  document.getElementById('n-r').style.display='';
  document.getElementById('n-admin').style.display='none';
  // Load from Firestore
  await loadFromFirestore();
  rAll();
  toast('🔓 Admin unlocked!');
  go('m');
}

// ── INIT ──────────────────────────────────────────────────────────────
load();
go('b');
// Load from cloud for everyone (not just admin) — with retry
(async function initCloud(){
  for(let i=0;i<5;i++){
    try{
      if(typeof db==='undefined'){await new Promise(r=>setTimeout(r,500));continue;}
      const snap=await db.collection('danatrack').doc(DOC_ID).get();
      if(snap.exists){
        const d=snap.data();
        S={...S,...d.state};
        localStorage.setItem('dt_v3',JSON.stringify(S));
        rAll();
        console.log('✅ Cloud data loaded:',S.projects.length,'projects');
      } else {
        console.log('No cloud data yet');
      }
      return;
    }catch(e){
      console.warn('Cloud load attempt '+(i+1)+':',e.message);
      await new Promise(r=>setTimeout(r,1000));
    }
  }
  console.warn('Cloud load failed after retries');
})();
</script>
